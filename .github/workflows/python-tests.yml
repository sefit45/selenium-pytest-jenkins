name: Python Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Selenium Grid with Docker Compose
        run: |
          docker compose -f Tests/docker-compose.yml up -d

      - name: Wait for Grid to be ready
        run: |
          sleep 15

      - name: Run tests
        run: |
          pytest Tests -v

      - name: Show Docker containers
        if: always()
        run: |
          docker ps

      - name: Show Selenium Hub logs
        if: always()
        run: |
          docker logs selenium-hub || true

      - name: Show Chrome node logs
        if: always()
        run: |
          docker logs chrome-node || true

      - name: Show Firefox node logs
        if: always()
        run: |
          docker logs firefox-node || true
