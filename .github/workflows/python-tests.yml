name: Python Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Selenium Grid with Docker Compose
        run: |
          docker compose -f Tests/docker-compose.yml up -d

      - name: Wait for Grid to be ready
        run: |
          sleep 30
          curl -s http://localhost:4444/wd/hub/status || true

      - name: Run tests with Allure results
        run: |
          pytest Tests -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore

      - name: Show Docker containers
        if: always()
        run: |
          docker ps

      - name: Show Selenium Hub logs
        if: always()
        run: |
          docker logs selenium-hub || true

      - name: Show Chrome node logs
        if: always()
        run: |
          docker logs chrome-node || true

      - name: Show Firefox node logs
        if: always()
        run: |
          docker logs firefox-node || true
